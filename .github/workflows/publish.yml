name: Publish to PyPI

# Publishes on a GitHub Release (or a v* tag) using PyPI Trusted Publishing
# (OIDC) — no API token stored in the repo. One-time setup: add a "pending
# publisher" for project `climaclass` on https://pypi.org/manage/account/publishing/
#   Owner: DarriEy   Repo: climaclass   Workflow: publish.yml   Environment: pypi

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
